[project]
name = "platform-db"
version = "0.0.1"
description = "SQLAlchemy models and Alembic migrations for the platform's structured state."
requires-python = ">=3.12"
dependencies = [
    "sqlalchemy>=2.0",
    "alembic>=1.13",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/platform_db"]
